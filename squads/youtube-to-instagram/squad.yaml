name: "YouTube → Instagram"
code: "youtube-to-instagram"
description: "Transforma vídeos (YouTube ou arquivo local) em um calendário semanal completo para o Instagram da Sucesso Imóvel: 5 posts (Seg-CT, Ter-PU1, Qua-PU2, Qui-PU3, Sex-CCTA), isca digital em PDF, roteiro YouTube, 6 roteiros de Reels virais, 7 roteiros de Stories diários e um dashboard semanal unificado."
icon: "🎬"
version: "3.0.0"
language: "Português (Brasil)"

company: "_opensquad/_memory/company.md"
memory: "_memory/memories.md"

skills:
  - web_search
  - web_fetch
  - image-creator
  - image-ai-generator

data:
  - pipeline/data/research-brief.md
  - pipeline/data/domain-framework.md
  - pipeline/data/quality-criteria.md
  - pipeline/data/output-examples.md
  - pipeline/data/anti-patterns.md
  - pipeline/data/tone-of-voice.md
  - pipeline/data/visual-identity.md
  - pipeline/data/template-reference.html
  - pipeline/data/hashtags.md
  - _templates/single-post-template.html
  - _templates/single-post-2-template.html
  - _templates/single-post-3-template.html

output_structure:
  posts_per_run: 5
  post_types:
    - id: seg-ct
      name: "Seg-CT — Carrossel Tutorial"
      template: pipeline/data/template-reference.html
      palette: "Premium Dark Roxo"
      cta: "Salvar o post"
      angle: "Tutorial/Aprofundamento — o como funciona"
      dimensions: "1080x1440"
      slides: "6-10 (preferir 7)"
    - id: ter-pu1
      name: "Ter-PU1 — Post Único com foto Dr. Jeorge"
      template: _templates/single-post-template.html
      palette: "Roxo/Preto"
      logo: "SI-Logo-Branco-Transp.png"
      cta: "Pergunta genuína + comentários"
      angle: "Principal — tema central"
      dimensions: "1080x1350"
    - id: qua-pu2
      name: "Qua-PU2 — Post Único com imagem IA"
      template: _templates/single-post-2-template.html
      palette: "Carvão/Roxo Claro (#C084FC)"
      logo: "SI-Logo-Branco-Transp.png"
      cta: "Deixar like"
      angle: "Impacto/Consequência"
      dimensions: "1080x1350"
      body_max_chars: 120
    - id: qui-pu3
      name: "Qui-PU3 — Post Único só texto"
      template: _templates/single-post-3-template.html
      palette: "Branco/Lavanda/Roxo Escuro"
      logo: "SI-Logo-Color-Transp.png"
      cta: "Seguir a Sucesso Imóvel"
      angle: "Reflexão/Princípio"
      dimensions: "1080x1350"
      body_max_chars: 120
    - id: sex-ccta
      name: "Sex-CCTA — Carrossel Isca Digital"
      template: pipeline/data/template-reference.html
      palette: "Premium Dark Roxo"
      cta: "Comentar palavra-chave (da isca digital)"
      angle: "Isca digital — incentivar download do material"
      dimensions: "1080x1440"
      slides: "6-10 (preferir 7)"

deliverables:
  - "Relatório de análise do vídeo (MD + HTML, 8 seções)"
  - "Isca digital (MD + PDF)"
  - "Roteiro YouTube (MD + HTML)"
  - "5 posts (Seg-CT, Ter-PU1, Qua-PU2, Qui-PU3, Sex-CCTA) em PNG"
  - "6 roteiros de Reels virais (MD + HTML unificado)"
  - "7 roteiros de Stories diários (MD + HTML semanal)"
  - "3 prompts de imagem IA (Google Imagen)"
  - "Dashboard semanal HTML auto-suficiente"

agents:
  - id: yago-video
    file: agents/yago-video.agent.md
  - id: iago-instagram
    file: agents/iago-instagram.agent.md
  - id: diego-design
    file: agents/diego-design.agent.md
  - id: renata-revisao
    file: agents/renata-revisao.agent.md

pipeline: pipeline/pipeline.yaml
