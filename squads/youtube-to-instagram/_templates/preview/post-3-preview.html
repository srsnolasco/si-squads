.quote-box {
  position: absolute; top: 600px; left: 52px; right: 52px;
  z-index: 25;
  background: rgba(109,40,217,0.06);
  border: 1px solid rgba(109,40,217,0.18);
  border-left: 6px solid #7B2FBE;
  border-radius: 0 20px 20px 0;
  padding: 40px 52px;
}
.quote-text {
  font-family: 'Montserrat', sans-serif; font-size: 44px; font-weight: 900;
  color: #1C1333; line-height: 1.15; letter-spacing: -0.5px;
}
.quote-text .accent { color: #7B2FBE; }
.quote-text .accent-light { color: #A855F7; }

/* ── CARD DE CONTEÚDO ───────────────── */
.content-card {
  position: absolute; bottom: 240px; left: 52px; right: 52px;
  z-index: 30;
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(109,40,217,0.15);
  border-radius: 24px; padding: 36px 52px;
}
.body-text {
  font-family: 'Inter', sans-serif; font-size: 34px;
  font-weight: 500; color: #2D1B4E; line-height: 1.60; margin-bottom: 24px;
}
.body-text .accent { color: #7B2FBE; font-weight: 600; }
.badge {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(109,40,217,0.08); border: 1px solid rgba(109,40,217,0.22);
  color: #4C1D95; font-family: 'Inter', sans-serif;
  font-size: 24px; font-weight: 600; padding: 11px 24px; border-radius: 100px;
}

/* ── CTA — SEGUIR ───────────────────── */
.cta-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 200px; z-index: 40;
  background: linear-gradient(135deg, #4C1D95 0%, #7B2FBE 42%, #5B21B6 100%);
  border-top: 2px solid rgba(196,181,253,0.35);
  display: flex; align-items: center; justify-content: center;
  padding: 0 60px;
}
.cta-bar::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent 0%, #DDD6FE 50%, transparent 100%);
}
.cta-main {
  font-family: 'Montserrat', sans-serif; font-size: 46px; font-weight: 900;
  color: #FFF; letter-spacing: -0.5px; line-height: 1.1; text-align: center;
}
</style>
</head>
<body>
<div class="slide">
  <div class="bg-pattern"></div>
  <div class="orb orb-tl"></div>
  <div class="orb orb-br"></div>
  <div class="orb orb-cta"></div>
  <div class="accent-line"></div>

  <!-- Header — usar logo colorido para fundo claro -->
  <div class="header">
    <div class="logo"><img src="data:image/png;base64,{{LOGO_B64}}" alt="Sucesso Imóvel"></div>
    <div class="tag">{{TAG}}</div>
  </div>

  <!-- Headline -->
  <div class="headline-block">
    <div class="eyebrow">{{EYEBROW}}</div>
    <div class="divider"></div>
    <div class="headline">{{HEADLINE}}</div>
  </div>

  <!-- Quote box — elemento visual central -->
  <div class="quote-box">
    <div class="quote-text">{{QUOTE_TEXT}}</div>
  </div>

  <!-- Card de conteúdo -->
  <div class="content-card">
    <div class="body-text">{{BODY_TEXT}}</div>
    <div class="badge">{{BADGE_TEXT}}</div>
  </div>

  <!-- CTA — pedido para seguir -->
  <div class="cta-bar">
    <div class="cta-main">{{CTA_TEXT}}</div>
  </div>
</div>
</body>
</html>
