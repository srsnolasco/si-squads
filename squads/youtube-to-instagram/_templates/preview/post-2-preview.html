<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap');
body { width: 1080px; height: 1350px; overflow: hidden; }

.slide {
  width: 1080px; height: 1350px;
  background: linear-gradient(160deg, #0D0D10 0%, #181820 45%, #080809 100%);
  position: relative; overflow: hidden;
}

/* Orbes — carvão com toque roxo suave */
.orb { position: absolute; border-radius: 50%; filter: blur(120px); pointer-events: none; }
.orb-tl  { width: 800px; height: 800px; background: #2E1065; opacity: 0.22; top: -280px; left: -200px; }
.orb-br  { width: 600px; height: 600px; background: #3B0764; opacity: 0.18; bottom: -180px; right: -120px; }
.orb-cta { width: 1100px; height: 280px; background: #4C1D95; opacity: 0.50; bottom: -80px; left: -100px; }
.orb-mid { width: 500px; height: 500px; background: #1A1A2E; opacity: 0.60; top: 400px; left: 200px; filter: blur(80px); }

/* ── IMAGEM IA — hero superior ─────── */
.ai-image-wrap {
  position: absolute; top: 0; left: 0; right: 0;
  height: 650px; z-index: 5; overflow: hidden;
}
.ai-image-wrap img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center center;
}
/* Fade suave da imagem para o fundo */
.ai-image-wrap::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 320px;
  background: linear-gradient(0deg, #0D0D10 0%, rgba(13,13,16,0.65) 55%, transparent 100%);
  z-index: 2;
}
.ai-image-wrap::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(180deg, rgba(13,13,16,0.25) 0%, transparent 35%);
  z-index: 2;
}

/* ── HEADER — sobre a imagem ────────── */
.header {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 44px 56px 0; z-index: 20;
}
.logo img { height: 92px; }
.tag {
  background: rgba(192,132,252,0.12); border: 1px solid rgba(192,132,252,0.40);
  color: #C084FC; font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 600;
  padding: 11px 26px; border-radius: 100px;
}

/* ── HEADLINE — sobre a imagem ── */
.headline-block {
  position: absolute; top: 460px; left: 60px; right: 60px;
  z-index: 20;
}
.eyebrow {
  font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 600;
  color: #C084FC; letter-spacing: 3.5px; text-transform: uppercase; margin-bottom: 14px;
}
.divider { width: 56px; height: 4px; background: linear-gradient(90deg, #7C3AED, #C084FC); border-radius: 2px; margin-bottom: 20px; }
.headline {
  font-family: 'Montserrat', sans-serif; font-size: 62px; font-weight: 900;
  color: #FFF; line-height: 1.06; letter-spacing: -1.5px;
  text-shadow: 0 2px 24px rgba(13,13,16,0.90);
}
.headline .accent { color: #C084FC; }

/* ── CARD DE CONTEÚDO ───────────────── */
.content-card {
  position: absolute; bottom: 240px; left: 52px; right: 52px;
  z-index: 30;
  background: rgba(8,8,10,0.60);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(192,132,252,0.18);
  border-radius: 24px; padding: 38px 52px;
}
.body-text {
  font-family: 'Inter', sans-serif; font-size: 36px;
  font-weight: 500; color: rgba(255,255,255,0.90); line-height: 1.60; margin-bottom: 26px;
}
.body-text .accent { color: #C084FC; font-weight: 600; }
.badge {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(192,132,252,0.10); border: 1px solid rgba(192,132,252,0.30);
  color: rgba(255,255,255,0.80); font-family: 'Inter', sans-serif;
  font-size: 24px; font-weight: 600; padding: 11px 24px; border-radius: 100px;
}

/* ── CTA — LIKE ─────────────────────── */
.cta-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 200px; z-index: 40;
  background: linear-gradient(135deg, #3B0764 0%, #6B21A8 42%, #4C1D95 100%);
  border-top: 2px solid rgba(192,132,252,0.25);
  display: flex; align-items: center; justify-content: center;
  padding: 0 60px;
}
.cta-bar::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent 0%, #C084FC 50%, transparent 100%);
}
.cta-main {
  font-family: 'Montserrat', sans-serif; font-size: 46px; font-weight: 900;
  color: #FFF; letter-spacing: -0.5px; line-height: 1.1; text-align: center;
}
</style>
</head>

  <!-- Imagem gerada por IA — hero superior -->
  <div class="ai-image-wrap">
    <img src="data:image/png;base64,{{AI_IMAGE_B64}}" alt="Imagem ilustrativa">
  </div>

  <!-- Header -->
  <div class="header">
    <div class="logo"><img src="data:image/png;base64,{{LOGO_B64}}" alt="Sucesso Imóvel"></div>
    <div class="tag">{{TAG}}</div>
  </div>

  <!-- Headline sobre a imagem -->
  <div class="headline-block">
    <div class="eyebrow">{{EYEBROW}}</div>
    <div class="divider"></div>
    <div class="headline">{{HEADLINE}}</div>
  </div>

  <!-- Card de conteúdo -->
  <div class="content-card">
    <div class="body-text">{{BODY_TEXT}}</div>
    <div class="badge">{{BADGE_TEXT}}</div>
  </div>

  <!-- CTA — pedido de like -->
  <div class="cta-bar">
    <div class="cta-main">{{CTA_TEXT}}</div>
  </div>
</div>
</body>
</html>
