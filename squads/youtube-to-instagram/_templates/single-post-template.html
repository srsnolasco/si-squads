<!DOCTYPE html>
<!--
  TEMPLATE: Post Único — Sucesso Imóvel
  Versão aprovada: v10 (2026-05-13)
  Proporção: 1080×1350px (4:5 — feed Instagram)

  PLACEHOLDERS (substituir na geração):
    {{LOGO_B64}}      — base64 do SI-Logo-Branco-Transp.png
    {{JEORGE_B64}}    — base64 da foto do Dr. Jeorge escolhida (com fundo transparente)
    {{TAG}}           — ex: "JURÍDICO / STJ"
    {{EYEBROW}}       — ex: "Novidade Jurídica"
    {{HEADLINE}}      — headline principal (suporta <br> e <span class="accent">)
    {{BODY_TEXT}}     — parágrafo explicativo (suporta <span class="accent">)
    {{BADGE_TEXT}}    — ex: "⚖️ Decisão de março de 2025"
    {{CTA_TEXT}}      — pergunta principal da CTA (Montserrat 900, branco, 46px)
    {{CTA_SUB}}       — instrução de ação abaixo da CTA (ex: "Responda nos comentários!") — Inter 500, lavanda #DDD6FE, 26px

  REGRAS DE LAYOUT:
    - Headline (left: 80px, width: 420px) termina em ~500px — não sobrepõe a foto
    - Foto do Dr. Jeorge: right: 0, top: 50px, width: 580px — começa em ~500px
    - Card de conteúdo: bottom: 240px — centralizado entre headline e CTA
    - CTA bar: 200px de altura, fundo roxo sólido, texto centralizado
    - SEM ícones/emojis na barra CTA
    - SEM @handle na barra CTA
    - SEM painéis separados — fundo unificado para headline e foto
-->
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap');
body { width: 1080px; height: 1350px; overflow: hidden; }

.slide {
  width: 1080px; height: 1350px;
  background: linear-gradient(155deg, #0C0018 0%, #1A0A2E 40%, #0A0A0A 100%);
  position: relative; overflow: hidden;
}

.orb { position: absolute; border-radius: 50%; filter: blur(110px); pointer-events: none; }
.orb-tl  { width: 800px; height: 800px; background: #4A1590; opacity: 0.22; top: -250px; left: -200px; }
.orb-br  { width: 700px; height: 700px; background: #6D28D9; opacity: 0.18; bottom: -200px; right: -150px; }
.orb-cta { width: 1100px; height: 320px; background: #5B21B6; opacity: 0.42; bottom: -80px; left: -100px; }

.accent-line {
  position: absolute; left: 60px; top: 80px;
  width: 5px; height: 300px;
  background: linear-gradient(180deg, #7B2FBE 0%, #A855F7 55%, transparent 100%);
  border-radius: 3px; z-index: 6;
}

/* ── HEADER ─────────────────────────── */
.header {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 44px 56px 0; z-index: 20;
}
.logo img { height: 92px; }
.tag {
  background: rgba(123,47,190,0.28); border: 1px solid rgba(168,85,247,0.45);
  color: #A855F7; font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 600;
  padding: 11px 26px; border-radius: 100px;
}

/* ── HEADLINE — esquerda, até ~500px ─── */
.headline-block {
  position: absolute; top: 60px; left: 80px;
  width: 420px; z-index: 20;
}
.eyebrow {
  font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 600;
  color: #A855F7; letter-spacing: 3.5px; text-transform: uppercase; margin-bottom: 14px;
}
.divider { width: 56px; height: 4px; background: linear-gradient(90deg, #7B2FBE, #A855F7); border-radius: 2px; margin-bottom: 20px; }
.headline {
  font-family: 'Montserrat', sans-serif; font-size: 60px; font-weight: 900;
  color: #FFF; line-height: 1.06; letter-spacing: -1.5px;
}
.headline .accent { color: #A855F7; }

/* ── DR. JEORGE — PNG transparente, coluna direita ── */
.jeorge-img {
  position: absolute; right: 0; top: 0;
  width: 660px; height: auto; z-index: 15;
  mask-image: linear-gradient(to bottom, black 0%, black 78%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, black 0%, black 78%, transparent 100%);
}
.jeorge-glow {
  position: absolute; bottom: 180px; right: 40px;
  width: 600px; height: 350px;
  background: radial-gradient(ellipse, rgba(109,40,217,0.35) 0%, transparent 70%);
  filter: blur(60px); z-index: 8;
}

/* ── CARD DE CONTEÚDO ───────────────── */
/* bottom: 240px centra o card entre headline (~669px) e CTA (~1150px) */
.content-card {
  position: absolute; bottom: 240px; left: 52px; right: 52px;
  z-index: 30;
  background: rgba(5,0,12,0.50);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(168,85,247,0.26);
  border-radius: 24px; padding: 40px 52px;
}
.body-text {
  font-family: 'Inter', sans-serif; font-size: 38px;
  font-weight: 500; color: rgba(255,255,255,0.90); line-height: 1.60; margin-bottom: 28px;
}
.body-text .accent { color: #A855F7; font-weight: 600; }
.badge {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: fit-content; margin: 0 auto;
  background: rgba(123,47,190,0.24); border: 1px solid rgba(168,85,247,0.38);
  color: rgba(255,255,255,0.82); font-family: 'Inter', sans-serif;
  font-size: 26px; font-weight: 600; padding: 12px 26px; border-radius: 100px;
}

/* ── CTA ────────────────────────────── */
.cta-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 200px; z-index: 40;
  background: linear-gradient(135deg, #5B21B6 0%, #7C3AED 42%, #6D28D9 100%);
  border-top: 2px solid rgba(196,181,253,0.28);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; padding: 0 60px;
}
.cta-bar::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent 0%, #A78BFA 50%, transparent 100%);
}
.cta-main {
  font-family: 'Montserrat', sans-serif; font-size: 46px; font-weight: 900;
  color: #FFF; letter-spacing: -0.5px; line-height: 1.1; text-align: center;
}
.cta-sub {
  font-family: 'Inter', sans-serif; font-size: 26px; font-weight: 500;
  color: #DDD6FE; letter-spacing: 0.5px; text-align: center;
}
</style>
</head>
<body>
<div class="slide">
  <div class="orb orb-tl"></div>
  <div class="orb orb-br"></div>
  <div class="orb orb-cta"></div>
  <div class="jeorge-glow"></div>
  <div class="accent-line"></div>

  <img class="jeorge-img" src="data:image/png;base64,{{JEORGE_B64}}" alt="Dr. Jeorge">

  <div class="headline-block">
    <div class="headline">{{HEADLINE}}</div>
  </div>

  <div class="content-card">
    <div class="body-text">{{BODY_TEXT}}</div>
    <div class="badge">{{BADGE_TEXT}}</div>
  </div>

  <div class="cta-bar">
    <div class="cta-main">{{CTA_TEXT}}</div>
    <div class="cta-sub">{{CTA_SUB}}</div>
  </div>
</div>
</body>
</html>
